<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flower Classifier</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --blush: #fffcfd;
        --petal: #f9d8e3;
        --rose: #e8a0b4;
        --deep-rose: #c0627e;
        --dusty: #d4849a;
        --dark: #3a1f27;
        --muted: rgba(58, 31, 39, 0.45);
        --border: rgba(175, 83, 112, 0.35);
        --white: #fffafc;
        --mono: "DM Mono", monospace;
        --serif: "Playfair Display", serif;
      }

      html,
      body {
        min-height: 100%;
        background: var(--blush);
        color: var(--dark);
        font-family: var(--serif);
      }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 24px 60px;
        background-image:
          radial-gradient(
            ellipse at 10% 0%,
            rgba(232, 160, 180, 0.25) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse at 90% 10%,
            rgba(249, 216, 227, 0.4) 0%,
            transparent 45%
          ),
          radial-gradient(
            ellipse at 50% 100%,
            rgba(212, 132, 154, 0.15) 0%,
            transparent 50%
          );
      }

      /* Decorative petals */
      body::before,
      body::after {
        content: "✿";
        position: fixed;
        font-size: 180px;
        opacity: 0.04;
        pointer-events: none;
        color: var(--deep-rose);
      }
      body::before {
        top: -40px;
        left: -40px;
        transform: rotate(-20deg);
      }
      body::after {
        bottom: -40px;
        right: -40px;
        transform: rotate(40deg);
      }

      header {
        text-align: center;
        margin-bottom: 32px;
        animation: fadeUp 0.9s ease both;
      }

      .eyebrow {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: var(--dusty);
        margin-bottom: 14px;
      }

      h1 {
        font-size: clamp(22px, 5vw, 46px);
        font-weight: 400;
        line-height: 1.1;
        letter-spacing: -0.01em;
        color: var(--dark);
      }

      h1 em {
        font-style: italic;
        color: var(--deep-rose);
      }

      .subtitle {
        margin-top: 12px;
        font-size: 16px;
        color: var(--muted);
        font-style: italic;
      }

      /* Floral divider */
      .divider {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 6px auto 0;
        justify-content: center;
        color: var(--rose);
        font-size: 14px;
        letter-spacing: 6px;
      }

      .card {
        width: 100%;
        max-width: 680px;
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        box-shadow:
          0 4px 32px rgba(192, 98, 126, 0.08),
          0 1px 4px rgba(192, 98, 126, 0.06);
        animation: fadeUp 0.9s ease 0.12s both;
      }

      .upload-zone {
        padding: 52px 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        cursor: pointer;
        border-bottom: 1px solid var(--border);
        transition: background 0.25s;
        position: relative;
      }

      .upload-zone:hover {
        background: rgba(249, 216, 227, 0.3);
      }
      .upload-zone.dragging {
        background: rgba(249, 216, 227, 0.5);
        border-color: var(--rose);
      }

      #file-input {
        display: none;
      }

      .upload-icon {
        width: 60px;
        height: 60px;
        border: 1.5px solid var(--rose);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 20px;
        background: rgba(249, 216, 227, 0.3);
        transition:
          border-color 0.2s,
          transform 0.2s,
          background 0.2s;
      }

      .upload-zone:hover .upload-icon {
        border-color: var(--deep-rose);
        background: rgba(249, 216, 227, 0.6);
        transform: translateY(-3px);
      }

      .upload-icon svg {
        width: 22px;
        height: 22px;
        stroke: var(--deep-rose);
        fill: none;
        stroke-width: 1.5;
      }

      .upload-text {
        font-size: 20px;
        color: var(--dark);
        margin-bottom: 8px;
      }

      .upload-hint {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--muted);
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .preview-wrap {
        display: none;
        flex-direction: column;
        align-items: center;
        padding: 28px 40px 20px;
        border-bottom: 1px solid var(--border);
        gap: 16px;
        background: rgba(249, 216, 227, 0.1);
      }

      .preview-wrap.visible {
        display: flex;
      }

      .preview-img {
        width: 150px;
        height: 150px;
        object-fit: cover;
        border-radius: 12px;
        border: 2px solid var(--petal);
        box-shadow: 0 4px 16px rgba(192, 98, 126, 0.15);
      }

      .change-btn {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--dusty);
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px 0;
        border-bottom: 1px solid transparent;
        transition:
          border-color 0.2s,
          color 0.2s;
      }

      .change-btn:hover {
        border-color: var(--dusty);
        color: var(--deep-rose);
      }

      .controls {
        padding: 24px 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
        gap: 16px;
        flex-wrap: wrap;
        background: rgba(253, 240, 243, 0.5);
      }

      .top-k-wrap {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .top-k-label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .top-k-select {
        font-family: var(--mono);
        font-size: 13px;
        border: 1px solid var(--border);
        background: var(--white);
        color: var(--dark);
        padding: 6px 12px;
        border-radius: 8px;
        cursor: pointer;
        outline: none;
        transition: border-color 0.2s;
      }

      .top-k-select:focus {
        border-color: var(--rose);
      }

      .predict-btn {
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        background: linear-gradient(135deg, var(--deep-rose), var(--dusty));
        color: #fff;
        border: none;
        padding: 13px 28px;
        border-radius: 10px;
        cursor: pointer;
        transition:
          opacity 0.2s,
          transform 0.1s,
          box-shadow 0.2s;
        flex-shrink: 0;
        box-shadow: 0 4px 16px rgba(192, 98, 126, 0.3);
      }

      .predict-btn:hover {
        opacity: 0.9;
        box-shadow: 0 6px 20px rgba(192, 98, 126, 0.4);
      }
      .predict-btn:active {
        transform: scale(0.97);
      }
      .predict-btn:disabled {
        background: rgba(58, 31, 39, 0.12);
        box-shadow: none;
        cursor: not-allowed;
      }

      .results {
        display: none;
        padding: 32px;
        flex-direction: column;
        gap: 0;
      }

      .results.visible {
        display: flex;
      }

      .results-label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--dusty);
        margin-bottom: 24px;
      }

      .result-row {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 14px 0;
        border-bottom: 1px solid var(--border);
        animation: fadeUp 0.4s ease both;
      }

      .result-row:last-child {
        border-bottom: none;
      }

      .result-rank {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--rose);
        width: 18px;
        flex-shrink: 0;
      }

      .result-info {
        flex: 1;
        min-width: 0;
      }

      .result-name {
        font-size: 19px;
        font-weight: 400;
        color: var(--dark);
        text-transform: capitalize;
        margin-bottom: 8px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .result-row:first-child .result-name {
        font-style: italic;
        color: var(--deep-rose);
      }

      .result-bar-wrap {
        height: 3px;
        background: rgba(232, 160, 180, 0.2);
        border-radius: 4px;
        overflow: hidden;
      }

      .result-bar {
        height: 100%;
        border-radius: 4px;
        background: linear-gradient(90deg, var(--rose), var(--deep-rose));
        width: 0%;
        transition: width 0.9s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .result-row:first-child .result-bar {
        background: linear-gradient(90deg, var(--deep-rose), #a0405a);
      }

      .result-prob {
        font-family: var(--mono);
        font-size: 13px;
        color: var(--dusty);
        flex-shrink: 0;
        width: 56px;
        text-align: right;
      }

      .result-row:first-child .result-prob {
        color: var(--deep-rose);
        font-weight: 400;
      }

      .loading {
        display: none;
        padding: 40px;
        align-items: center;
        justify-content: center;
        gap: 14px;
        flex-direction: column;
      }

      .loading.visible {
        display: flex;
      }

      .loading-text {
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--dusty);
      }

      .spinner {
        width: 30px;
        height: 30px;
        border: 1.5px solid var(--petal);
        border-top-color: var(--deep-rose);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      .error-msg {
        display: none;
        padding: 20px 32px;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--deep-rose);
        letter-spacing: 0.05em;
      }

      .error-msg.visible {
        display: block;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <header>
      <p class="eyebrow">Deep Learning · 102 Species</p>
      <h1>Miar's Flower<br /><em>Classifier</em></h1>
      <div class="divider">✦ ✿ ✦</div>
      <p class="subtitle">Upload a photo, identify the species</p>
    </header>

    <div class="card">
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept="image/*" />
        <div class="upload-icon">
          <svg viewBox="0 0 24 24">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
        </div>
        <p class="upload-text">Drop your flower image here</p>
        <p class="upload-hint">or click to browse · JPG, PNG</p>
      </div>

      <div class="preview-wrap" id="preview-wrap">
        <img class="preview-img" id="preview-img" src="" alt="Preview" />
        <button class="change-btn" id="change-btn">Change image</button>
      </div>

      <div class="controls">
        <div class="top-k-wrap">
          <span class="top-k-label">Top results</span>
          <select class="top-k-select" id="top-k">
            <option value="3">3</option>
            <option value="5" selected>5</option>
            <option value="10">10</option>
          </select>
        </div>
        <button class="predict-btn" id="predict-btn" disabled>
          Identify Flower
        </button>
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p class="loading-text">Analysing image…</p>
      </div>

      <p class="error-msg" id="error-msg"></p>

      <div class="results" id="results"></div>
    </div>

    <script>
      const uploadZone = document.getElementById("upload-zone");
      const fileInput = document.getElementById("file-input");
      const previewWrap = document.getElementById("preview-wrap");
      const previewImg = document.getElementById("preview-img");
      const changeBtn = document.getElementById("change-btn");
      const predictBtn = document.getElementById("predict-btn");
      const topKSelect = document.getElementById("top-k");
      const loading = document.getElementById("loading");
      const results = document.getElementById("results");
      const errorMsg = document.getElementById("error-msg");

      let selectedFile = null;

      uploadZone.addEventListener("click", () => fileInput.click());
      uploadZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        uploadZone.classList.add("dragging");
      });
      uploadZone.addEventListener("dragleave", () =>
        uploadZone.classList.remove("dragging"),
      );
      uploadZone.addEventListener("drop", (e) => {
        e.preventDefault();
        uploadZone.classList.remove("dragging");
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith("image/")) handleFile(file);
      });

      fileInput.addEventListener("change", () => {
        if (fileInput.files[0]) handleFile(fileInput.files[0]);
      });

      changeBtn.addEventListener("click", () => {
        selectedFile = null;
        previewWrap.classList.remove("visible");
        uploadZone.style.display = "flex";
        predictBtn.disabled = true;
        results.classList.remove("visible");
        results.innerHTML = "";
        errorMsg.classList.remove("visible");
        fileInput.value = "";
      });

      function handleFile(file) {
        selectedFile = file;
        const reader = new FileReader();
        reader.onload = (e) => {
          previewImg.src = e.target.result;
          uploadZone.style.display = "none";
          previewWrap.classList.add("visible");
          predictBtn.disabled = false;
          results.classList.remove("visible");
          results.innerHTML = "";
          errorMsg.classList.remove("visible");
        };
        reader.readAsDataURL(file);
      }

      predictBtn.addEventListener("click", async () => {
        if (!selectedFile) return;
        loading.classList.add("visible");
        results.classList.remove("visible");
        results.innerHTML = "";
        errorMsg.classList.remove("visible");
        predictBtn.disabled = true;

        const formData = new FormData();
        formData.append("image", selectedFile);
        formData.append("top_k", topKSelect.value);

        try {
          const res = await fetch("http://127.0.0.1:5000/predict", {
            method: "POST",
            body: formData,
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error);

          loading.classList.remove("visible");
          results.classList.add("visible");

          const label = document.createElement("p");
          label.className = "results-label";
          label.textContent = "Predictions";
          results.appendChild(label);

          data.predictions.forEach((p, i) => {
            const row = document.createElement("div");
            row.className = "result-row";
            row.style.animationDelay = `${i * 0.07}s`;
            row.innerHTML = `
              <span class="result-rank">${i + 1}</span>
              <div class="result-info">
                <div class="result-name">${p.name}</div>
                <div class="result-bar-wrap">
                  <div class="result-bar" data-width="${p.probability}"></div>
                </div>
              </div>
              <span class="result-prob">${p.probability}%</span>
            `;
            results.appendChild(row);
          });

          requestAnimationFrame(() => {
            document.querySelectorAll(".result-bar").forEach((bar) => {
              bar.style.width = bar.dataset.width + "%";
            });
          });
        } catch (err) {
          loading.classList.remove("visible");
          errorMsg.textContent =
            "Could not connect to the server. Make sure app.py is running.";
          errorMsg.classList.add("visible");
        }

        predictBtn.disabled = false;
      });
    </script>
  </body>
</html>
